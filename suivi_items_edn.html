<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi des items · EDN 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f2efe9;font-family:'Inter',sans-serif;font-size:13px;color:#1a1a1a}
body{display:grid;grid-template-rows:auto auto auto 1fr;height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#6a4a6a 0%,#9a7a9a 100%);padding:14px 24px;display:flex;align-items:center;gap:16px}
.hdr-left{flex:1}
.hdr-back{font-size:10px;color:rgba(255,255,255,.4);text-decoration:none;display:flex;align-items:center;gap:4px;margin-bottom:4px;transition:.15s}
.hdr-back:hover{color:rgba(255,255,255,.7)}
.hdr-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:white;line-height:1}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.4);margin-top:3px;letter-spacing:.3px}
.hdr-stats{display:flex;gap:20px}
.hstat{text-align:right}
.hstat-val{font-size:18px;font-weight:700;color:white;line-height:1}
.hstat-lbl{font-size:8px;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}

/* ── TOOLBAR ── */
.toolbar{background:white;border-bottom:1px solid #e8e4de;padding:8px 24px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:160px;max-width:280px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.35;width:13px;height:13px}
.search-inp{width:100%;padding:6px 10px 6px 28px;border:1px solid #e0dcd6;border-radius:8px;font-size:11px;background:#f9f8f6;outline:none;font-family:inherit;transition:.15s}
.search-inp:focus{border-color:#9a7a9a;background:white}
.filter-btn{padding:5px 11px;border-radius:8px;border:1px solid #e0dcd6;background:white;font-size:10px;font-weight:500;color:#666;cursor:pointer;transition:.15s;white-space:nowrap}
.filter-btn:hover{border-color:#9a7a9a;color:#9a7a9a}
.filter-btn.on{background:#9a7a9a;color:white;border-color:#9a7a9a}
.sep{width:1px;height:20px;background:#e8e4de;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid #e0dcd6;background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s;flex-shrink:0}
.hbtn{padding:4px 10px;border-radius:7px;border:1.5px solid rgba(255,255,255,.25);background:transparent;color:white;font-size:9px;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.5)}
.icon-btn:hover{border-color:#9a7a9a}
.icon-btn.on{background:#9a7a9a;border-color:#9a7a9a}

/* ── VIEW TABS ── */
.vtabs{background:white;border-bottom:2px solid #e8e4de;padding:0 24px;display:flex;gap:0}
.vtab{padding:8px 16px;font-size:11px;font-weight:500;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s;white-space:nowrap}
.vtab:hover{color:#9a7a9a}
.vtab.on{color:#9a7a9a;border-color:#9a7a9a;font-weight:600}

/* ── CONTENT ── */
.content{overflow-y:auto;padding:0}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:900px}
thead tr{background:#f9f8f6;position:sticky;top:0;z-index:10}
th{padding:8px 12px;text-align:left;font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;border-bottom:2px solid #e8e4de;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#9a7a9a}
th.sorted{color:#9a7a9a}
th .si{font-size:8px;margin-left:3px;opacity:.5}
th.sorted .si{opacity:1}
td{padding:7px 12px;border-bottom:1px solid #f0ece6;vertical-align:middle;font-size:11px}
tr:hover td{background:#faf9f7}
tr.done td{background:#f5faf5}

/* ── CELLS ── */
.num{font-weight:700;color:#9a7a9a;font-size:12px;width:40px}
.title-cell{max-width:220px}
.title-main{font-size:11px;font-weight:500;color:#1a1a1a;line-height:1.4;cursor:pointer}
.title-main:hover{color:#9a7a9a;text-decoration:underline}
.title-edit{width:100%;padding:3px 6px;border:1px solid #9a7a9a;border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:white}
.spec-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:600;background:#f0edf8;color:#9a7a9a;cursor:pointer;white-space:nowrap;transition:.15s}
.spec-pill:hover{background:#9a7a9a;color:white}
.rang-a{display:inline-block;padding:1px 5px;border-radius:4px;font-size:8px;font-weight:700;background:#dcf5e8;color:#1a7a40}
.rang-b{display:inline-block;padding:1px 5px;border-radius:4px;font-size:8px;font-weight:700;background:#eee8f8;color:#9a7a9a}
.ck{width:14px;height:14px;accent-color:#9a7a9a;cursor:pointer;display:block;margin:auto}
select.sel{font-size:10px;border:1px solid #e0dcd6;border-radius:6px;padding:2px 4px;background:#f9f8f6;cursor:pointer;font-family:inherit;outline:none;max-width:100%}
select.sel:focus{border-color:#9a7a9a}
.fresh-tag{display:inline-block;padding:2px 6px;border-radius:5px;font-size:9px;font-weight:600}
.f-new{background:#dcf5e8;color:#1a7a40}
.f-ok{background:#f5f0dc;color:#7a6020}
.f-warn{background:#f5e8d8;color:#9a5020}
.f-old{background:#f5dede;color:#8a2020}
.f-never{background:#f0edf8;color:#9a7a9a}
.nb-inp{width:38px;padding:2px 4px;border:1px solid #e0dcd6;border-radius:5px;text-align:center;font-size:10px;font-family:inherit;outline:none}
.nb-inp:focus{border-color:#9a7a9a}
textarea.note{width:100%;padding:3px 5px;border:1px solid #e0dcd6;border-radius:5px;font-size:10px;resize:none;min-height:28px;font-family:inherit;background:#f9f8f6;outline:none;transition:min-height .15s,box-shadow .15s;position:relative}
textarea.note:focus{border-color:#9a7a9a;background:white;min-height:90px;box-shadow:0 4px 14px rgba(0,0,0,.12);position:relative;z-index:5}
.obj-toggle{font-size:10px;color:#9a7a9a;cursor:pointer;white-space:nowrap;background:none;border:none;font-family:inherit;padding:2px 6px;border-radius:5px;transition:.15s}
.obj-toggle:hover{background:#f0edf8}

/* ── OBJECTIFS PANEL ── */
.obj-panel{background:#faf9f8;border-top:1px solid #f0ece6;padding:10px 16px;overflow-x:auto}
.obj-table{width:100%;min-width:1000px;border-collapse:collapse;font-size:10px}
.obj-table th{padding:4px 8px;background:#f0edf8;color:#9a7a9a;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.obj-table td{padding:5px 8px;border-bottom:1px solid #f0ece6;vertical-align:top}
.obj-intitule{max-width:400px;line-height:1.4}
.obj-intitule-edit{width:100%;padding:2px 5px;border:1px solid #9a7a9a;border-radius:4px;font-size:10px;font-family:inherit;outline:none}
.rang-sel{padding:1px 4px;border:1px solid #ddd;border-radius:4px;font-size:9px;font-weight:700;cursor:pointer;outline:none}
.rang-sel.a{background:#dcf5e8;color:#1a7a40;border-color:#b0e0c0}
.rang-sel.b{background:#eee8f8;color:#9a7a9a;border-color:#c8b8e8}

/* ── SPEC DROPDOWN ── */
.spec-dropdown{position:fixed;z-index:1000;background:white;border:1px solid #e0dcd6;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:6px;min-width:200px;max-height:300px;overflow-y:auto;display:none}
.spec-dropdown.open{display:block}
.spec-opt{display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:6px;cursor:pointer;font-size:11px;transition:.1s}
.spec-opt:hover{background:#f0edf8}
.spec-opt-icon{font-size:14px;width:20px;text-align:center}

/* ── SUPPORTS ── */
.chips{display:flex;gap:3px;flex-wrap:wrap;max-width:160px}
.chip{font-size:8px;padding:1px 5px;border-radius:4px;cursor:pointer;border:1px solid #e0dcd6;background:white;transition:.1s;white-space:nowrap}
.chip.on{background:#9a7a9a;color:white;border-color:#9a7a9a}

/* ── PROGRESS BARS ── */
.prog{height:3px;border-radius:2px;background:#e8e4de;overflow:hidden;margin-top:2px}
.prog-fill{height:100%;background:#9a7a9a;border-radius:2px;transition:.3s}

/* ── SPEC VIEW ── */
.spec-section{margin:0;border-bottom:2px solid #e8e4de}
.spec-hdr{padding:10px 24px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;background:#f9f8f6;transition:.15s}
.spec-hdr:hover{background:#f2efe9}
.spec-emoji{font-size:18px}
.spec-name{font-size:12px;font-weight:600;flex:1}
.spec-prog-wrap{width:80px}
.spec-count{font-size:10px;color:#999}
.spec-chev{font-size:10px;color:#ccc;transition:.2s}
.spec-chev.open{transform:rotate(180deg)}
.spec-body{display:none}
.spec-body.open{display:block}

/* ── DASH ── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:20px 24px}
.dash-card{background:white;border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dash-card h4{font-size:10px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar-label{font-size:9px;color:#666;width:70px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-outer{flex:1;height:14px;background:#f0ece6;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:5px;transition:.4s}
.bar-fill span{font-size:8px;color:white;font-weight:600}
.bar-val{font-size:9px;color:#999;width:42px;text-align:right}

/* ── FLASH REVIEW ── */
.flash-bar{background:#9a7a9a;color:white;padding:6px 24px;display:flex;align-items:center;gap:10px;font-size:10px;cursor:pointer;transition:.15s}
.flash-bar:hover{background:#5a4f7b}
.flash-count{background:rgba(255,255,255,.2);border-radius:10px;padding:1px 7px;font-size:9px;font-weight:600}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:500;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:white;border-radius:16px;padding:22px;max-width:480px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal h3{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:14px;color:#6a4a6a}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:7px 16px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
.btn-p{background:#9a7a9a;color:white}
.btn-p:hover{background:#5a4f7b}
.btn-s{background:#f0ece6;color:#666}
.btn-s:hover{background:#e8e4de}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#6a4a6a;color:white;padding:8px 18px;border-radius:20px;font-size:11px;opacity:0;transition:.3s;z-index:2000;pointer-events:none}
.toast.show{opacity:1}

/* ── SAVE BAR ── */
.save-bar{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e8e4de;padding:7px 24px;display:flex;align-items:center;gap:8px;z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.save-bar span{font-size:9px;color:#aaa;flex:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <a href="index.html" class="hdr-back">‹ Tableau de bord</a>
    <div class="hdr-title">Suivi des items</div>
    <div class="hdr-sub">EDN 2026 · 367 items · 4 906 objectifs</div>
  </div>
  <div class="hdr-stats">
    <div class="hstat"><div class="hstat-val" id="g-lu">—</div><div class="hstat-lbl">Lus</div></div>
    <div class="hstat"><div class="hstat-val" id="g-qcm">—</div><div class="hstat-lbl">QCM</div></div>
    <div class="hstat"><div class="hstat-val" id="g-mais">—</div><div class="hstat-lbl">Maîtrise</div></div>
    <button class="hbtn" onclick="exportJSON()">⬇ JSON</button>
    <button class="hbtn" onclick="exportCSV()">⬇ CSV</button>
    <button class="hbtn" onclick="importJSON()">⬆ Importer</button>
  </div>
</div>

<div class="toolbar">
  <div class="search-wrap">
    <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/></svg>
    <input class="search-inp" type="text" placeholder="Rechercher un item…" oninput="setQ(this.value)" id="searchInp">
  </div>
  <button class="filter-btn on" onclick="setF('all',this)">Tous</button>
  <button class="filter-btn" onclick="setF('notlu',this)">Non lus</button>
  <button class="filter-btn" onclick="setF('lu',this)">Lus</button>
  <button class="filter-btn" onclick="setF('fragile',this)">Fragiles</button>
  <button class="filter-btn" onclick="setF('qcm',this)">QCM ✓</button>
  <button class="filter-btn" onclick="setF('old',this)">À revoir</button>
  <button class="filter-btn" onclick="setF('notanki',this)">Non ankifiés</button>
  <button class="filter-btn" onclick="setF('fresh',this)">Fraîcheur ↓</button>
</div>

<div class="vtabs">
  <div class="vtab on" onclick="setView('spec',this)">Par spécialité</div>
  <div class="vtab" onclick="setView('num',this)">Par numéro</div>
  <div class="vtab" onclick="setView('ue',this)">Par UE</div>
  <div class="vtab" onclick="setView('obj',this)">Objectifs</div>
  <div class="vtab" onclick="setView('dash',this)">Dashboard</div>
</div>

<div class="content" id="content"></div>

<div id="itemEditBg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:900;align-items:center;justify-content:center">
  <div style="background:white;border-radius:14px;padding:18px;max-width:380px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.18)">
    <div style="font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Modifier l'item <span id="ieNum"></span></div>
    <label style="font-size:9px;color:#999;display:block;margin-bottom:3px">Titre</label>
    <input id="ieTitle" style="width:100%;padding:6px 9px;border:1px solid #e0dcd6;border-radius:8px;font-size:12px;font-family:inherit;outline:none;margin-bottom:12px" onfocus="this.style.borderColor='#9a7a9a'" onblur="this.style.borderColor='#e0dcd6'">
    <label style="font-size:9px;color:#999;display:block;margin-bottom:5px">Spécialité &amp; emoji</label>
    <div id="ieSpecGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;max-height:160px;overflow-y:auto;margin-bottom:14px;padding:6px;background:#f9f8f6;border-radius:8px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeItemEdit()" style="padding:6px 13px;border-radius:8px;border:none;background:#f0ece6;color:#666;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">Annuler</button>
      <button onclick="saveItemEdit()" style="padding:6px 13px;border-radius:8px;border:none;background:#9a7a9a;color:white;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">Enregistrer</button>
    </div>
  </div>
</div>

<div id="objEditBg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:900;align-items:center;justify-content:center">
  <div style="background:white;border-radius:14px;padding:18px;max-width:440px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.18)">
    <div style="font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Modifier l'objectif <span id="oeRef"></span></div>
    <label style="font-size:9px;color:#999;display:block;margin-bottom:3px">Intitulé</label>
    <textarea id="oeIntitule" style="width:100%;padding:7px 9px;border:1px solid #e0dcd6;border-radius:8px;font-size:12px;font-family:inherit;outline:none;margin-bottom:14px;resize:vertical;min-height:64px" onfocus="this.style.borderColor='#9a7a9a'" onblur="this.style.borderColor='#e0dcd6'"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeObjEdit()" style="padding:6px 13px;border-radius:8px;border:none;background:#f0ece6;color:#666;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">Annuler</button>
      <button onclick="saveObjEdit()" style="padding:6px 13px;border-radius:8px;border:none;background:#9a7a9a;color:white;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">Enregistrer</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="flashModal">
  <div class="modal">
    <h3 id="flashNum"></h3>
    <div style="font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:6px;line-height:1.4" id="flashTitle"></div>
    <div style="font-size:11px;color:#888;margin-bottom:12px" id="flashSpec"></div>
    <div id="flashObjs" style="background:#f9f8f6;border-radius:8px;padding:10px;max-height:180px;overflow-y:auto;display:none"></div>
    <button onclick="togFlashObjs()" style="font-size:10px;color:#9a7a9a;background:none;border:none;cursor:pointer;padding:4px 0;margin-top:6px" id="flashObjBtn">Voir les objectifs</button>
    <div class="modal-btns">
      <button class="btn btn-s" onclick="closeFlash()">Fermer</button>
      <button class="btn btn-p" onclick="markFlashDone()">Marquer vu ✓</button>
      <button class="btn btn-p" onclick="nextFlash()">Suivant →</button>
    </div>
    <div style="font-size:9px;color:#aaa;text-align:center;margin-top:8px" id="flashCount"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

function getEffAnki(it){

function fresh(last){
  if(!last) return {cls:'f-never',lbl:'Jamais'};
  var days=Math.floor((Date.now()-new Date(last).getTime())/86400000);
  if(days<=14) return {cls:'f-new',lbl:days+'j'};
  if(days<=30) return {cls:'f-ok',lbl:days+'j'};
  if(days<=45) return {cls:'f-warn',lbl:days+'j'};
  return {cls:'f-old',lbl:days+'j'};
}

    if(curFilter==='qcm' && !d.qcm) return false;
    if(curFilter==='old'){var f=fresh(d.last); if(f.cls!=='f-old'&&f.cls!=='f-never') return false;}
    if(curFilter==='notanki' && getEffAnki(it)) return false;
    return true;
  });
}
function setQ(v){curQ=v;render();}
function setF(f,btn){curFilter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');render();}
function setView(v,el){
  curView=v;
  document.querySelectorAll('.vtab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  render();
}
function setSort(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}render();}
function sortItems(list){
  if(!sortCol) return list;
  return list.slice().sort(function(a,b){
    var da=getItemData(a.num),db=getItemData(b.num),va,vb;
    if(sortCol==='mais'){va=parseInt(da.mais);vb=parseInt(db.mais);}
    else if(sortCol==='fresh'){va=da.last?new Date(da.last).getTime():0;vb=db.last?new Date(db.last).getTime():0;}
    else if(sortCol==='nb'){va=da.nb;vb=db.nb;}
    else{va=a.num;vb=b.num;}
    return (va-vb)*sortDir;
  });
}

function mkSpecSection(spec, items){
  var icon=SPEC_MAP[spec]||'📋';
  var id='sp_'+spec.replace(/[^a-z0-9]/gi,'_');
  var lu=items.filter(function(it){return getItemData(it.num).lu;}).length;
  var pct=items.length?Math.round(lu/items.length*100):0;

  return '<div class="spec-section">'+
    '<div class="spec-hdr" onclick="togSpec(\''+id+'\')">'+

    '<span class="spec-count">'+lu+'/'+items.length+'</span>'+
    '<div class="spec-prog-wrap"><div class="prog"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>'+

function togSpec(id){
  var body=document.getElementById('body_'+id), chev=document.getElementById('chev_'+id);
  var isOpen=body.classList.contains('open');
  openSpecs[id]=!isOpen;
  body.classList.toggle('open');
  chev.classList.toggle('open');
  if(!isOpen && !body.innerHTML.trim()){
    var spec=id.replace('sp_','').replace(/_/g,' ');
    // Trouver les items correspondants à cette section
    var items=ITEMS.filter(function(it){return ('sp_'+getEffSpec(it).replace(/[^a-z0-9]/gi,'_'))===id;});
    body.innerHTML=mkTable(filterItems(items));
  }
}

// ============================================================
// MAIN RENDER
// ============================================================
function render(){
  var c=document.getElementById('content'), html='';
  if(curView==='spec'){
    var bySpec={};
    ITEMS.forEach(function(it){var s=getEffSpec(it);if(!bySpec[s])bySpec[s]=[];bySpec[s].push(it);});
    Object.keys(bySpec).sort().forEach(function(s){html+=mkSpecSection(s,bySpec[s]);});
  } else if(curView==='num'){
    html=mkTable(filterItems(ITEMS));
  } else if(curView==='ue'){
    UE_RANGES.forEach(function(ue){
      var items=ITEMS.filter(function(it){return it.num>=ue[1]&&it.num<=ue[2];});
      var id='ue_'+ue[1];
      var lu=items.filter(function(it){return getItemData(it.num).lu;}).length;
      var pct=items.length?Math.round(lu/items.length*100):0;
      var isOpen=openSpecs[id]||false;
      html+='<div class="spec-section"><div class="spec-hdr" onclick="togUE(\''+id+'\')">'+
        '<span class="spec-emoji">📖</span><span class="spec-name">'+ue[0]+'</span>'+
        '<span class="spec-count">'+lu+'/'+items.length+'</span>'+
        '<div class="spec-prog-wrap"><div class="prog"><div class="prog-fill" style="width:'+pct+'%"></div></div></div>'+
        '<span class="spec-chev'+(isOpen?' open':'')+'" id="chev_'+id+'">⌄</span></div>'+
        '<div class="spec-body'+(isOpen?' open':'')+'" id="body_'+id+'">'+(isOpen?mkTable(filterItems(items)):'')+'</div></div>';
    });
  } else if(curView==='obj'){
    html=mkObjView();
  } else if(curView==='dash'){
    html=mkDash();
  }
  c.innerHTML=html||'<div style="padding:30px;text-align:center;color:#bbb">Rien à afficher</div>';
  updStats();
}
function togUE(id){
  var body=document.getElementById('body_'+id), chev=document.getElementById('chev_'+id);
  var isOpen=body.classList.contains('open');
  openSpecs[id]=!isOpen;
  body.classList.toggle('open'); chev.classList.toggle('open');
  if(!isOpen && !body.innerHTML.trim()){
    var min=parseInt(id.replace('ue_',''));
    var ue=UE_RANGES.find(function(u){return u[1]===min;});
    var items=ITEMS.filter(function(it){return it.num>=ue[1]&&it.num<=ue[2];});
    body.innerHTML=mkTable(filterItems(items));
  }
}

// OBJ VIEW (flat list of all objectives)
// ============================================================
function mkObjView(){
  var all=[];
  ITEMS.forEach(function(it){it.objectives.forEach(function(o){all.push({it:it,o:o});});});
  var q=curQ.toLowerCase();
  var filtered=all.filter(function(r){
    if(q){
      if(r.o.intitule.toLowerCase().indexOf(q)<0 && r.it.num.toString().indexOf(q)<0) return false;
    }
    var od=getObjData(r.it.num,r.o.idx);
    if(curFilter==='notlu' && od.lu) return false;
    if(curFilter==='lu' && !od.lu) return false;
    if(curFilter==='fragile' && od.mais!=='1') return false;
    if(curFilter==='qcm' && !od.qcm) return false;
    if(curFilter==='old'){var f=fresh(od.last); if(f.cls!=='f-old'&&f.cls!=='f-never') return false;}
    if(curFilter==='notanki' && getEffAnki(r.it)) return false;
    return true;
  });
  if(curFilter==='fresh'){
    var order={'f-never':0,'f-old':1,'f-warn':2,'f-ok':3,'f-new':4};
    filtered=filtered.slice().sort(function(a,b){
      var fa=fresh(getObjData(a.it.num,a.o.idx).last), fb=fresh(getObjData(b.it.num,b.o.idx).last);
      return order[fa.cls]-order[fb.cls];
    });
  }
  var rows=filtered.slice(0,400).map(function(r){
    var n=r.it.num, od=getObjData(n,r.o.idx), f=fresh(od.last);
    return '<tr>'+
      '<td class="num">'+n+'</td>'+
      '<td style="font-size:10px;color:#888;max-width:140px">'+esc(getEffTitle(r.it))+'</td>'+
      '<td><span class="rang-'+r.o.rang.toLowerCase()+'">'+r.o.rang+'</span></td>'+
      '<td style="font-size:9px;color:#999">'+esc(r.o.type)+'</td>'+
      '<td>'+esc(r.o.intitule)+'</td>'+
      '<td style="text-align:center"><input type="checkbox" class="ck" '+(od.anki?'checked':'')+' onchange="setObjBool(\'oanki\','+n+','+r.o.idx+',this)"></td>'+
      '<td style="text-align:center"><input type="checkbox" class="ck" '+(od.fiches?'checked':'')+' onchange="setObjBool(\'ofiches\','+n+','+r.o.idx+',this)"></td>'+
      '<td style="text-align:center"><input type="checkbox" class="ck" '+(od.lu?'checked':'')+' onchange="setObjBool(\'olu\','+n+','+r.o.idx+',this)"></td>'+
      '<td style="text-align:center"><input type="checkbox" class="ck" '+(od.qcm?'checked':'')+' onchange="setObjBool(\'oqcm\','+n+','+r.o.idx+',this)"></td>'+
      '<td style="font-size:9px;color:#777">'+MAIS_LBL[parseInt(od.mais)]+'</td>'+
      '<td style="text-align:center"><span class="fresh-tag '+f.cls+'">'+f.lbl+'</span></td>'+
    '</tr>';
  }).join('');
  var more=filtered.length>400?'<div style="padding:10px;text-align:center;color:#bbb;font-size:10px">'+(filtered.length-400)+' objectifs supplémentaires sur '+filtered.length+' — affinez la recherche</div>':'';
  var countLbl='<div style="padding:6px 12px;font-size:9px;color:#aaa">'+filtered.length+' objectif'+(filtered.length!==1?'s':'')+'</div>';
  return countLbl+'<div class="tbl-wrap"><table><thead><tr>'+
    '<th style="width:45px">#</th><th style="width:140px">Item</th><th style="width:50px">Rang</th><th style="width:100px">Type</th><th>Intitulé</th>'+
    '<th style="width:38px">Anki</th><th style="width:44px">Fiches</th>'+
    '<th style="width:34px">Lu</th><th style="width:34px">QCM</th><th style="width:90px">Maîtrise</th><th style="width:54px">Fraîch.</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>'+more;
}

// ============================================================
// DASHBOARD
// ============================================================
function mkDash(){
  var bySpec={};
  ITEMS.forEach(function(it){var s=getEffSpec(it);if(!bySpec[s])bySpec[s]={total:0,lu:0,icon:SPEC_MAP[s]||'📋',color:it.color};bySpec[s].total++;if(getItemData(it.num).lu)bySpec[s].lu++;});
  var specs=Object.keys(bySpec).sort(function(a,b){return bySpec[b].lu/bySpec[b].total-bySpec[a].lu/bySpec[a].total;});
  var barsHtml=specs.map(function(s){
    var d=bySpec[s],pct=Math.round(d.lu/d.total*100);
    return '<div class="bar-row"><div class="bar-label">'+d.icon+' '+esc(s.substring(0,12))+'</div>'+
      '<div class="bar-outer"><div class="bar-fill" style="width:'+pct+'%;background:'+d.color+'">'+(pct>15?'<span>'+pct+'%</span>':'')+'</div></div>'+
      '<div class="bar-val">'+d.lu+'/'+d.total+'</div></div>';
  }).join('');

  var total=ITEMS.length, lu=0, mais=0, qcm=0;
  ITEMS.forEach(function(it){var d=getItemData(it.num);if(d.lu)lu++;if(d.mais==='3')mais++;if(d.qcm)qcm++;});

  // Répartition des items par maîtrise et par fraîcheur
  var itemMais=[0,0,0,0];
  var itemFresh={'f-never':0,'f-old':0,'f-warn':0,'f-ok':0,'f-new':0};
  ITEMS.forEach(function(it){
    var d=getItemData(it.num);
    itemMais[parseInt(d.mais)]++;
    itemFresh[fresh(d.last).cls]++;
  });
  var maisColorsI=['#ccc','#c47a7a','#d9a85a','#1a7a40'];
  var itemMaisBars=MAIS_LBL.map(function(lbl,i){
    var pct=total?Math.round(itemMais[i]/total*100):0;
    return '<div class="bar-row"><div class="bar-label">'+(lbl==='—'?'Non noté':lbl)+'</div>'+
      '<div class="bar-outer"><div class="bar-fill" style="width:'+pct+'%;background:'+maisColorsI[i]+'">'+(pct>10?'<span>'+pct+'%</span>':'')+'</div></div>'+
      '<div class="bar-val">'+itemMais[i]+'</div></div>';
  }).join('');
  var freshLblsI={'f-never':'Jamais','f-old':'> 45j','f-warn':'31-45j','f-ok':'15-30j','f-new':'≤ 14j'};
  var freshColorsI={'f-never':'#ccc','f-old':'#c47a7a','f-warn':'#d9a85a','f-ok':'#d9c85a','f-new':'#1a7a40'};
  var itemFreshBars=['f-never','f-old','f-warn','f-ok','f-new'].map(function(cls){
    var pct=total?Math.round(itemFresh[cls]/total*100):0;
    return '<div class="bar-row"><div class="bar-label">'+freshLblsI[cls]+'</div>'+
      '<div class="bar-outer"><div class="bar-fill" style="width:'+pct+'%;background:'+freshColorsI[cls]+'">'+(pct>10?'<span>'+pct+'%</span>':'')+'</div></div>'+
      '<div class="bar-val">'+itemFresh[cls]+'</div></div>';
  }).join('');

  // Vue d'ensemble des objectifs (niveau individuel)
  var totalObj=0, objLu=0, objQcm=0;
  var objMais=[0,0,0,0]; // index 0=non noté,1=fragile,2=en cours,3=maîtrisé
  var objFresh={'f-never':0,'f-old':0,'f-warn':0,'f-ok':0,'f-new':0};
  ITEMS.forEach(function(it){
    it.objectives.forEach(function(o){
      totalObj++;
      var od=getObjData(it.num,o.idx);
      if(od.lu) objLu++;
      if(od.qcm) objQcm++;
      objMais[parseInt(od.mais)]++;
      objFresh[fresh(od.last).cls]++;
    });
  });
  var maisColors=['#ccc','#c47a7a','#d9a85a','#1a7a40'];
  var maisBars=MAIS_LBL.map(function(lbl,i){
    var pct=totalObj?Math.round(objMais[i]/totalObj*100):0;
    return '<div class="bar-row"><div class="bar-label">'+(lbl==='—'?'Non noté':lbl)+'</div>'+
      '<div class="bar-outer"><div class="bar-fill" style="width:'+pct+'%;background:'+maisColors[i]+'">'+(pct>10?'<span>'+pct+'%</span>':'')+'</div></div>'+
      '<div class="bar-val">'+objMais[i]+'</div></div>';
  }).join('');
  var freshLbls={'f-never':'Jamais','f-old':'> 45j','f-warn':'31-45j','f-ok':'15-30j','f-new':'≤ 14j'};
  var freshColors={'f-never':'#ccc','f-old':'#c47a7a','f-warn':'#d9a85a','f-ok':'#d9c85a','f-new':'#1a7a40'};
  var freshBars=['f-never','f-old','f-warn','f-ok','f-new'].map(function(cls){
    var pct=totalObj?Math.round(objFresh[cls]/totalObj*100):0;
    return '<div class="bar-row"><div class="bar-label">'+freshLbls[cls]+'</div>'+
      '<div class="bar-outer"><div class="bar-fill" style="width:'+pct+'%;background:'+freshColors[cls]+'">'+(pct>10?'<span>'+pct+'%</span>':'')+'</div></div>'+
      '<div class="bar-val">'+objFresh[cls]+'</div></div>';
  }).join('');

  return '<div class="dash-grid">'+
    '<div class="dash-card" style="grid-column:1/-1"><h4>Progression par spécialité</h4>'+barsHtml+'</div>'+
    '<div class="dash-card"><h4>Vue d\'ensemble — items</h4>'+
      '<div class="bar-row"><div class="bar-label">Lus</div><div class="bar-outer"><div class="bar-fill" style="width:'+Math.round(lu/total*100)+'%;background:#9a7a9a"><span>'+Math.round(lu/total*100)+'%</span></div></div><div class="bar-val">'+lu+'/'+total+'</div></div>'+
      '<div class="bar-row"><div class="bar-label">QCM</div><div class="bar-outer"><div class="bar-fill" style="width:'+Math.round(qcm/total*100)+'%;background:#6b5f8b"><span>'+Math.round(qcm/total*100)+'%</span></div></div><div class="bar-val">'+qcm+'/'+total+'</div></div>'+
      '<div class="bar-row"><div class="bar-label">Maîtrisés</div><div class="bar-outer"><div class="bar-fill" style="width:'+Math.round(mais/total*100)+'%;background:#1a7a40"><span>'+Math.round(mais/total*100)+'%</span></div></div><div class="bar-val">'+mais+'/'+total+'</div></div>'+
    '</div>'+
    '<div class="dash-card"><h4>Items par maîtrise <span style="color:#ccc;font-weight:400">('+total+' au total)</span></h4>'+itemMaisBars+'</div>'+
    '<div class="dash-card"><h4>Items par fraîcheur</h4>'+itemFreshBars+'</div>'+
    '<div class="dash-card"><h4>Objectifs par maîtrise <span style="color:#ccc;font-weight:400">('+totalObj+' au total)</span></h4>'+maisBars+
      '<div style="margin-top:8px;padding-top:8px;border-top:1px solid #f0ece6;font-size:9px;color:#aaa">'+objLu+' lus · '+objQcm+' avec QCM fait</div>'+
    '</div>'+
    '<div class="dash-card"><h4>Objectifs par fraîcheur</h4>'+freshBars+'</div>'+
  '</div>';
}

// ============================================================
// EDITING (titre, spécialité, rang d'objectif, intitulé)
// ============================================================
var ieCurNum=null, ieCurSpec=null;
function editTitle(num){ openItemEdit({stopPropagation:function(){}}, num); }
function openSpecDD(e, num){ openItemEdit(e, num); }
function openItemEdit(e,num){
  if(e && e.stopPropagation) e.stopPropagation();
  var it=ITEMS.find(function(x){return x.num===num;});
  if(!it) return;
  ieCurNum=num;
  ieCurSpec=getEffSpec(it);
  document.getElementById('ieNum').textContent='#'+num;
  document.getElementById('ieTitle').value=getEffTitle(it);
  var grid=document.getElementById('ieSpecGrid');
  grid.innerHTML=SPECS.map(function(s){
    var sel=s[0]===ieCurSpec;
    return '<div onclick="ieSelectSpec(\''+s[0].replace(/'/g,"\\'")+'\')" title="'+esc(s[0])+'" style="text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;font-size:16px;background:'+(sel?'#9a7a9a':'transparent')+';transition:.1s" id="iespec_'+s[0].replace(/[^a-z0-9]/gi,'_')+'">'+s[1]+'</div>';
  }).join('');
  document.getElementById('itemEditBg').style.display='flex';
}
function ieSelectSpec(spec){
  ieCurSpec=spec;
  document.querySelectorAll('#ieSpecGrid > div').forEach(function(d){d.style.background='transparent';});
  var el=document.getElementById('iespec_'+spec.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.style.background='#9a7a9a';
}
function closeItemEdit(){document.getElementById('itemEditBg').style.display='none';}
function saveItemEdit(){
  var it=ITEMS.find(function(x){return x.num===ieCurNum;});
  if(!it) return;
  var newTitle=document.getElementById('ieTitle').value.trim();
  if(newTitle && newTitle!==it.title) sv('ti_'+ieCurNum,newTitle); else sv('ti_'+ieCurNum,'');
  if(ieCurSpec && ieCurSpec!==it.spec) sv('sc_'+ieCurNum,ieCurSpec); else sv('sc_'+ieCurNum,'');
  closeItemEdit();
  render();
  toast('Item mis à jour ✅');
}

function setObjRang(num, idx, sel){
  var v=sel.value;
  sv('orang_'+num+'_'+idx, v);
  sel.className='rang-sel '+v.toLowerCase();
  var it=ITEMS.find(function(x){return x.num===num;});
  it.objectives[idx].rang=v;
}
var oeCurNum=null, oeCurIdx=null;
function editObjIntitule(num, idx){
  var it=ITEMS.find(function(x){return x.num===num;});
  if(!it) return;
  oeCurNum=num; oeCurIdx=idx;
  document.getElementById('oeRef').textContent='— Item #'+num+', rang '+it.objectives[idx].rang;
  document.getElementById('oeIntitule').value=it.objectives[idx].intitule;
  document.getElementById('objEditBg').style.display='flex';
}
function closeObjEdit(){document.getElementById('objEditBg').style.display='none';}
function saveObjEdit(){
  var it=ITEMS.find(function(x){return x.num===oeCurNum;});
  if(!it) return;
  var v=document.getElementById('oeIntitule').value.trim();
  it.objectives[oeCurIdx].intitule=v;
  sv('oint_'+oeCurNum+'_'+oeCurIdx, v);
  var el=document.getElementById('oi'+oeCurNum+'_'+oeCurIdx);
  if(el){
    el.innerHTML=esc(v)+' <span style="opacity:.3;font-size:9px">✎</span>';
    el.onclick=(function(n,i){return function(){editObjIntitule(n,i);};})(oeCurNum,oeCurIdx);
  }
  closeObjEdit();
  toast('Objectif mis à jour ✅');
}

// Apply stored objective overrides on load
ITEMS.forEach(function(it){
  it.objectives.forEach(function(o,idx){
    var r=ld('orang_'+it.num+'_'+idx,'');
    if(r) o.rang=r;
    var t=ld('oint_'+it.num+'_'+idx,'');
    if(t) o.intitule=t;
  });
});

// ============================================================
// SIMPLE SETTERS
// ============================================================
function setBool(key,num,cb){sv(key+'_'+num,cb.checked?'1':'0');var row=document.getElementById('r'+num);if(row)row.classList.toggle('done',cb.checked && key==='lu');updStats();}
function setVal(key,num,val){sv(key+'_'+num,val);updStats();}
function setLast(num,val){
  sv('ls_'+num,val);
  var cur=parseInt(ld('nb_'+num,'0')||'0');
  sv('nb_'+num,String(cur+1));
  var nbEl=document.getElementById('nb'+num); if(nbEl) nbEl.value=cur+1;
  var frEl=document.getElementById('fr'+num);
  if(frEl){var f=fresh(val);frEl.className='fresh-tag '+f.cls;frEl.textContent=f.lbl;}
  updStats();
}
function togSup(num,sup,el){
  var cur=ld('sp_'+num,''); var arr=cur?cur.split(',').filter(Boolean):[];
  var i=arr.indexOf(sup); if(i>=0)arr.splice(i,1); else arr.push(sup);
  sv('sp_'+num,arr.join(','));
  el.classList.toggle('on');
}
function togObjRow(num){
  var row=document.getElementById('orow'+num);
  var open=row.style.display!=='none';
  row.style.display=open?'none':'table-row';
}

function updStats(){
  var total=ITEMS.length, lu=0, qcm=0, mais=0;
  ITEMS.forEach(function(it){var d=getItemData(it.num);if(d.lu)lu++;if(d.qcm)qcm++;if(d.mais==='3')mais++;});
  document.getElementById('g-lu').textContent=Math.round(lu/total*100)+'%';
  document.getElementById('g-qcm').textContent=Math.round(qcm/total*100)+'%';
  document.getElementById('g-mais').textContent=Math.round(mais/total*100)+'%';
}

// ============================================================
// FLASH REVIEW
// ============================================================
function buildFlashPool(){flashPool=ITEMS.filter(function(it){return !getItemData(it.num).lu;});}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportJSON(){
  var data={};
  try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k.indexOf('si_')===0)data[k]=localStorage.getItem(k);}}catch(e){}
  var b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='suivi_items_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  toast('Exporté ✅');
}
function exportCSV(){
  var rows=[['Num','Titre','Spécialité','Lu','QCM','Maîtrise','Vus','Dernière','Note']];
  ITEMS.forEach(function(it){
    var d=getItemData(it.num);
    rows.push([it.num,'"'+getEffTitle(it).replace(/"/g,'""')+'"','"'+getEffSpec(it)+'"',d.lu?'Oui':'Non',d.qcm?'Oui':'Non',MAIS_LBL[parseInt(d.mais)],d.nb,d.last,'"'+(d.note||'').replace(/"/g,'""')+'"']);
  });
  var csv=rows.map(function(r){return r.join(',');}).join('\n');
  var b=new Blob(['\uFEFF'+csv],{type:'text/csv'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='suivi_items_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  toast('CSV exporté ✅');
}
function importJSON(){
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var r=new FileReader();
    r.onload=function(ev){
      try{var data=JSON.parse(ev.target.result);
        Object.keys(data).forEach(function(k){localStorage.setItem(k,data[k]);});
        toast('Importé ✅'); setTimeout(function(){location.reload();},1000);
      }catch(err){toast('Fichier invalide ❌');}
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

render();
</script></body></html>

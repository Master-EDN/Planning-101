.tab:hover{color:#3d6b8a}

.tab.active .cnt{background:#3d6b8a;color:white}

.section{display:none}
.section.active{display:block}
.sec-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding:12px 16px;background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}

.sec-title{font-size:14px;font-weight:600;color:#1a1a1a}
.sec-sub{font-size:10px;color:#999;margin-top:1px}

.prog-bar{height:100%;background:linear-gradient(90deg,#3d6b8a,#6b94aa);border-radius:10px;transition:.3s}
.prog-lbl{font-size:10px;color:#999;font-weight:600;white-space:nowrap}

table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06)}
thead tr{background:#f5f8fa}
th{padding:8px 10px;text-align:left;font-weight:600;font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:#3d6b8a}
th.c{text-align:center}
td{padding:7px 10px;border-bottom:1px solid #eef2f5;vertical-align:middle;font-size:11px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcfd}
tr.done-row td{background:#f3f7f0!important}
.ck{width:15px;height:15px;accent-color:#3d6b8a;cursor:pointer;display:block;margin:auto}
.note-edn{font-weight:700;color:#3d6b8a}

<script>
const GSHEET_URL = "https://script.google.com/macros/s/AKfycbwv3meUEQ690HbhavV0ZQBwoTI5xU7F0R6NzA9cYUM3oRVZQ-1MFi99VKCuZmskO_Pe/exec";

async function syncToSheets(source) {
  const data = {};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    data[k]=localStorage.getItem(k);
  }
  showToast('☁️ Synchronisation en cours...');
  try{
    const resp = await fetch(GSHEET_URL, {
      method:'POST',
      body: JSON.stringify({source: source, payload: data}),
    });
    const result = await resp.json();
    if(result.status==='ok') showToast('✅ Synchronisé avec Google Sheets !');
    else showToast('❌ Erreur de synchronisation');
  } catch(e) {
    showToast('❌ Erreur réseau : ' + e.message);
  }
}

async function restoreFromSheets(source) {
  showToast('☁️ Récupération en cours...');
  try{
    const resp = await fetch(GSHEET_URL + '?source=' + encodeURIComponent(source));
    const data = await resp.json();
    if(Object.keys(data).length === 0){ showToast('⚠️ Aucune donnée trouvée'); return; }
    Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
    showToast('✅ Données restaurées ! Rechargement...');
    setTimeout(()=>location.reload(), 1200);
  } catch(e) {
    showToast('❌ Erreur réseau : ' + e.message);
  }
}

function exportData(filename){
  const data={};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    data[k]=localStorage.getItem(k);
  }
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename+'_sauvegarde_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('✅ Données exportées !');
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=function(e){
    const file=e.target.files[0];
    const reader=new FileReader();
    reader.onload=function(ev){
      try{
        const data=JSON.parse(ev.target.result);
        Object.keys(data).forEach(k=>localStorage.setItem(k,data[k]));
        showToast('✅ Données importées ! Rechargement...');
        setTimeout(()=>location.reload(),1200);
      }catch(err){showToast('❌ Fichier invalide');}
    };
    reader.readAsText(file);
  };
  input.click();
}
function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.body.appendChild(t);}
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script></body></html>

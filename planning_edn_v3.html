<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232a2a28' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M5 3v6a4 4 0 008 0V3'/%3E%3Cpath d='M9 17a5 5 0 005-5'/%3E%3Ccircle cx='19' cy='6' r='2'/%3E%3Ccircle cx='9' cy='20' r='2'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner · EDN 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f2efe9;font-family:'Inter',sans-serif;font-size:12px;color:#1a1a1a}
body{display:flex;flex-direction:column;height:100vh}

/* HEADER */
.hdr{background:transparent;padding:16px 22px 12px;display:flex;align-items:center;gap:14px;flex-shrink:0;flex-wrap:wrap}
.hdr-back{font-size:10px;color:#a8a8a4;text-decoration:none;display:block;margin-bottom:5px;transition:.15s}
.hdr-back:hover{color:#2d5a6b}
.hdr-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#2d5a6b;line-height:1}
.hdr-sub{font-size:9px;color:#a8a8a4;margin-top:2px}
.hdr-stats{display:flex;gap:14px;margin-left:auto;align-items:center}
.hstat-val{font-size:14px;font-weight:700;color:#3a4a4f;line-height:1}
.hstat-lbl{font-size:7px;color:#b0b0ac;text-transform:uppercase;letter-spacing:1px}
.hbtn{padding:4px 10px;border-radius:7px;border:1.5px solid #c8d8dc;background:white;color:#2d5a6b;font-size:9px;font-weight:600;cursor:pointer;transition:.15s}
.hbtn:hover{background:#2d5a6b;border-color:#2d5a6b;color:white}
.hbtn.red{border-color:#e0c0c0;color:#a85050;background:white}
.hbtn.red:hover{background:#a85050;border-color:#a85050;color:white}

/* TABS */
.tabs{background:white;border-bottom:2px solid #e8e4de;display:flex;flex-shrink:0}
.tab{padding:8px 16px;font-size:10px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab:hover{color:#2d5a6b}
.tab.active{color:#2d5a6b;border-bottom-color:#2d5a6b}

/* WEEK NAV */
.week-nav{background:white;padding:6px 14px;display:flex;gap:4px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid #eee}
.week-nav::-webkit-scrollbar{height:3px}
.week-nav::-webkit-scrollbar-thumb{background:#ddd}
.wtab{padding:3px 10px;border-radius:11px;border:1.5px solid #e0dcd6;background:white;color:#999;font-size:9px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.15s}
.wtab:hover{border-color:#2d5a6b;color:#2d5a6b}
.wtab.active{background:#2d5a6b;color:white;border-color:#2d5a6b}
.wtab.done{border-color:#5a9a72;color:#5a9a72}
.wtab.done.active{background:#5a9a72;border-color:#5a9a72;color:white}

/* PLANNING LAYOUT */
.planning-view{display:flex;flex:1;overflow:hidden}
.cal-area{flex:1;overflow-y:auto;padding:10px 12px}
.cal-area::-webkit-scrollbar{width:5px}
.cal-area::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
.week-days-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:7px}
.weekend-row{display:grid;grid-template-columns:1fr 1fr;gap:7px}

.day-card{background:white;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);display:flex;flex-direction:column;min-height:130px}
.day-card.blocked{opacity:.6;background:#f6f5f3}
.day-card.we-card{min-height:90px}
.day-hdr{padding:5px 8px;border-bottom:1px solid #f0ece6;display:flex;align-items:center;justify-content:space-between;background:#f9f8f6}
.day-hdr.blocked-hdr{background:#f1f0ee}
.dname{font-size:9px;font-weight:700}
.ddate{font-size:8px;color:#bbb}
.dobj-count{font-size:8px;font-weight:700;color:#2d5a6b;background:#e8f0f2;border-radius:3px;padding:1px 4px}
.day-fixed{padding:4px 6px;background:#fafaf8;border-bottom:1px solid #f0ece6}
.fixed-task{display:flex;align-items:center;gap:4px;padding:2px 0}
.fixed-task input{width:10px;height:10px;accent-color:#2d5a6b;cursor:pointer}
.fixed-lbl{font-size:9px;color:#666}
.fixed-lbl.done{text-decoration:line-through;color:#ccc}
.drop-zone{flex:1;min-height:40px;padding:4px 6px;display:flex;flex-direction:column;gap:3px}
.drop-zone.drag-over{background:#e8f0f2;outline:2px dashed #2d5a6b;outline-offset:-2px;border-radius:6px}
.drop-empty{font-size:8px;color:#ddd;text-align:center;padding:8px 0;font-style:italic}

/* ITEM SLOTS (New/QCM) */
.item-slots{display:flex;flex-direction:column;gap:3px;padding:4px 6px;border-bottom:1px solid #f0ece6}
.slot-block{display:flex;flex-direction:column;gap:2px}
.slot-label{font-size:8px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px}
.slot-zone{min-height:20px;border-radius:6px;background:#fafaf8;padding:2px;display:flex;flex-direction:column;gap:2px;transition:.15s}
.slot-zone.drag-over{background:#eef3f4;outline:2px dashed #2d5a6b;outline-offset:-1px}
.slot-empty{font-size:8px;color:#ddd;text-align:center;padding:2px 0}

/* TODO PERSO */
.todo-perso{padding:5px 6px;border-top:1px solid #f0ece6;background:#fcfbf9}
.todo-title{font-size:8px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px}
.todo-list{display:flex;flex-direction:column;gap:2px;margin-bottom:4px}
.todo-row{display:flex;align-items:center;gap:4px;font-size:9px}
.todo-row input[type=checkbox]{width:10px;height:10px;accent-color:#a85a3d;cursor:pointer;flex-shrink:0}
.todo-text{flex:1;color:#444}
.todo-row.done .todo-text{text-decoration:line-through;color:#ccc}
.todo-del{font-size:9px;color:#ccc;cursor:pointer;flex-shrink:0}
.todo-del:hover{color:#c47a7a}
.todo-add{display:flex;gap:3px}
.todo-add input{flex:1;font-size:9px;padding:3px 5px;border:1px solid #e0dcd6;border-radius:5px;outline:none;font-family:inherit}
.todo-add input:focus{border-color:#a85a3d}
.todo-add button{width:20px;height:20px;border-radius:5px;border:none;background:#a85a3d;color:white;font-size:12px;cursor:pointer;flex-shrink:0;line-height:1}

/* WEEK OBJECTIVES */
.week-objectives{background:linear-gradient(135deg,#f7faf6,#f0f6ee);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);padding:10px 14px;margin-top:8px;border-left:3px solid #6a9a5a}
.wo-title{font-size:11px;font-weight:700;color:#4a7a3a;margin-bottom:7px}
.wo-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.wobj-row{display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 4px;border-radius:5px}
.wobj-row:hover{background:rgba(255,255,255,.6)}
.wobj-row input[type=checkbox]{width:13px;height:13px;accent-color:#6a9a5a;cursor:pointer;flex-shrink:0}
.wobj-text{flex:1;color:#333}
.wobj-row.done .wobj-text{text-decoration:line-through;color:#ccc}
.wobj-del{font-size:11px;color:#bcd0b0;cursor:pointer;flex-shrink:0}
.wobj-del:hover{color:#c47a7a}
.wo-empty{font-size:10px;color:#a8c099;font-style:italic}
.wo-add{display:flex;gap:6px}
.wo-add input{flex:1;font-size:11px;padding:6px 9px;border:1px solid #d8e8d0;border-radius:7px;outline:none;font-family:inherit;background:rgba(255,255,255,.6)}
.wo-add input:focus{border-color:#6a9a5a;background:white}
.wo-add button{padding:0 14px;border-radius:7px;border:none;background:#6a9a5a;color:white;font-size:14px;cursor:pointer;font-weight:600}

/* CARNET DE BORD */
.week-journal{background:linear-gradient(135deg,#fdfaf6,#fbf6ee);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.05),0 0 0 1px rgba(0,0,0,.04);padding:10px 14px;margin-top:8px;border-left:3px solid #c8a05a}
.wj-title{font-size:11px;font-weight:700;color:#9a7a3a;margin-bottom:2px}
.wj-sub{font-size:9px;color:#bba578;margin-bottom:8px;font-style:italic}
.wj-list{display:flex;flex-direction:column;gap:4px;margin-bottom:8px}
.journal-row{display:flex;align-items:flex-start;gap:7px;font-size:11px;padding:4px 6px;border-radius:6px;background:rgba(255,255,255,.5)}
.journal-dot{color:#c8a05a;font-size:10px;flex-shrink:0;margin-top:1px}
.journal-text{flex:1;color:#5a4a30;line-height:1.4}
.journal-del{font-size:11px;color:#d8cba0;cursor:pointer;flex-shrink:0}
.journal-del:hover{color:#c47a7a}
.wj-empty{font-size:10px;color:#c8b888;font-style:italic}
.wj-add{display:flex;gap:6px}
.wj-add input{flex:1;font-size:11px;padding:6px 9px;border:1px solid #e8dcc0;border-radius:7px;outline:none;font-family:inherit;background:rgba(255,255,255,.6)}
.wj-add input:focus{border-color:#c8a05a;background:white}
.wj-add button{padding:0 14px;border-radius:7px;border:none;background:#c8a05a;color:white;font-size:14px;cursor:pointer;font-weight:600}
.cal-pill{border-radius:5px;padding:3px 5px;display:flex;align-items:flex-start;gap:4px;cursor:grab}
.cal-pill:active{cursor:grabbing;opacity:.7}
.cal-pill-text{flex:1;min-width:0}
.cal-pill-remove{font-size:9px;color:#ccc;cursor:pointer;flex-shrink:0}
.cal-pill-remove:hover{color:#c47a7a}
.pill-item{background:#eef3f4;border-left:2px solid #2d5a6b}
.pill-mc{background:#fdf3ee;border-left:2px solid #c8825a}
.pill-ann-edn{background:#eef1f8;border-left:2px solid #4a3f6b}
.pill-ann-rattrap{background:#fdf0f0;border-left:2px solid #c47a7a}
.pill-ann-ecnnf{background:#eef5ff;border-left:2px solid #4a7aaa}
.pill-ann-ecni{background:#eef6f0;border-left:2px solid #5a9a72}
.pill-ann-blanc{background:#f4f4f4;border-left:2px solid #aaa}

/* SIDEBAR */
.sidebar{width:255px;border-left:2px solid #e8e4de;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;background:white}
.sidebar-hdr{padding:7px 10px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.sbtn{padding:2px 8px;border:1px solid #e0dcd6;border-radius:5px;font-size:9px;cursor:pointer;background:white;color:#666;transition:.15s;font-weight:500}
.sidebar-search{padding:5px 10px;border-bottom:1px solid #eee}
.sidebar-search input{width:100%;padding:4px 8px;border:1px solid #e0dcd6;border-radius:7px;font-size:10px;outline:none;font-family:inherit}
.sidebar-search input:focus{border-color:#2d5a6b}
.sidebar-list{flex:1;overflow-y:auto;padding:5px 7px;display:flex;flex-direction:column;gap:3px}
.sidebar-list::-webkit-scrollbar{width:4px}
.sidebar-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.side-pill{border-radius:7px;padding:6px 8px;cursor:grab;display:flex;align-items:flex-start;gap:6px;border:1px solid transparent;transition:.15s}
.side-pill:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:#e0dcd6}
.side-pill:active{cursor:grabbing;opacity:.7}
.side-pill.assigned{opacity:.35;cursor:default}
.side-pill-body{flex:1;min-width:0}
.side-pill-title{font-size:10px;font-weight:500;line-height:1.3}
.side-pill-meta{font-size:9px;color:#aaa;margin-top:2px}

/* DASHBOARDS */
.dash-area{flex:1;overflow:hidden;display:none;flex-direction:column}
.dash-content{flex:1;overflow-y:auto;padding:12px 16px}
.dash-table{width:100%;border-collapse:collapse}
.dash-table th{padding:6px 8px;text-align:left;font-size:9px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.6px;border-bottom:2px solid #e8e4de;white-space:nowrap}
.dash-table td{padding:5px 8px;border-bottom:1px solid #f0ece6;font-size:10px;vertical-align:middle}
.dash-table tr:hover td{background:#faf9f7}
.sem-badge{font-size:9px;font-weight:600;border-radius:4px;padding:1px 6px;background:#eee;color:#999;display:inline-block}
.sem-badge.assigned{background:#e8f3eb;color:#2a7a4a}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <a href="index.html" class="hdr-back">‹ Tableau de bord</a>
    <div class="hdr-title">Planner</div>
    <div class="hdr-sub">15 juin → 11 oct 2026 · drag &amp; drop</div>
  </div>
  <div class="hdr-stats">
    <div style="text-align:right"><div class="hstat-val" id="g-items">0/212</div><div class="hstat-lbl">Items placés</div></div>
    <div style="text-align:right"><div class="hstat-val" id="g-done">0%</div><div class="hstat-lbl">Faits</div></div>
    <button class="hbtn" onclick="exportPlanning()">⬇ Exporter</button>
    <button class="hbtn" onclick="importPlanning()">⬆ Importer</button>
    <button class="hbtn red" onclick="resetPlanning()">↺ Reset</button>
  </div>
</div>
<div class="tabs">
  <div class="tab active" onclick="setTab('planning')">📅 Planning</div>
  <div class="tab" onclick="setTab('dash-items')">📋 Items</div>
  <div class="tab" onclick="setTab('dash-mc')">📚 Masterclass</div>
  <div class="tab" onclick="setTab('dash-ann')">📝 Annales</div>
  <div class="tab" onclick="setTab('dash-journal')">📔 Carnet de bord</div>
</div>
<div id="planningView" style="display:flex;flex:1;overflow:hidden">
  <div style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="week-nav" id="weekNav"></div>
    <div class="cal-area" id="calArea"></div>
  </div>
  <div class="sidebar">
    <div class="sidebar-hdr">
      <div style="display:flex;gap:3px">
        <button class="sbtn" id="sbtn_items" onclick="setSidebarMode('items')">Items</button>
        <button class="sbtn" id="sbtn_mc" onclick="setSidebarMode('mc')">Masterclass</button>
        <button class="sbtn" id="sbtn_ann" onclick="setSidebarMode('ann')">Annales</button>
      </div>
      <span style="font-size:9px;color:#aaa;margin-left:auto" id="sidebarCount"></span>
    </div>
    <div class="sidebar-search"><input type="text" placeholder="Rechercher…" oninput="filterSidebar(this.value)" id="sidebarSearch"></div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>
</div>
<div class="dash-area" id="dash-items"><div class="dash-content"><table class="dash-table"><thead><tr><th>#</th><th>Item</th><th>Spécialité</th><th>Obj.</th><th>New</th><th>QCM</th><th>Total</th><th>Jours planifiés</th><th>Fait</th></tr></thead><tbody id="dash-items-body"></tbody></table></div></div>
<div class="dash-area" id="dash-mc"><div class="dash-content"><table class="dash-table"><thead><tr><th>Note</th><th>Masterclass</th><th>Spécialité</th><th>Semaine</th><th>Fait</th></tr></thead><tbody id="dash-mc-body"></tbody></table></div></div>
<div class="dash-area" id="dash-ann"><div class="dash-content"><table class="dash-table"><thead><tr><th>Annale</th><th>Type</th><th>Semaine</th><th>UC1</th><th>UC2</th><th>UC3</th><th>LCA1</th><th>LCA2</th></tr></thead><tbody id="dash-ann-body"></tbody></table></div></div>
<div class="dash-area" id="dash-journal"><div class="dash-content" id="dash-journal-content" style="max-width:700px"></div></div>

<div id="itemEditBg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:900;align-items:center;justify-content:center">
  <div style="background:white;border-radius:14px;padding:18px;max-width:380px;width:90%;box-shadow:0 16px 48px rgba(0,0,0,.18)">
    <div style="font-size:9px;color:#999;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Modifier l'item <span id="ieNum"></span></div>
    <label style="font-size:9px;color:#999;display:block;margin-bottom:3px">Titre</label>
    <input id="ieTitle" style="width:100%;padding:6px 9px;border:1px solid #e0dcd6;border-radius:8px;font-size:12px;font-family:inherit;outline:none;margin-bottom:12px" onfocus="this.style.borderColor='#2d5a6b'" onblur="this.style.borderColor='#e0dcd6'">
    <label style="font-size:9px;color:#999;display:block;margin-bottom:3px">Nombre d'objectifs</label>
    <input id="ieNObj" type="number" min="0" style="width:100%;padding:6px 9px;border:1px solid #e0dcd6;border-radius:8px;font-size:12px;font-family:inherit;outline:none;margin-bottom:12px" onfocus="this.style.borderColor='#2d5a6b'" onblur="this.style.borderColor='#e0dcd6'">
    <label style="font-size:9px;color:#999;display:block;margin-bottom:5px">Spécialité &amp; emoji</label>
    <div id="ieSpecGrid" style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;max-height:160px;overflow-y:auto;margin-bottom:14px;padding:6px;background:#f9f8f6;border-radius:8px"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeItemEdit()" style="padding:6px 13px;border-radius:8px;border:none;background:#f0ece6;color:#666;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">Annuler</button>
      <button onclick="saveItemEdit()" style="padding:6px 13px;border-radius:8px;border:none;background:#2d5a6b;color:white;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">Enregistrer</button>
    </div>
  </div>
</div>
<script>
var SPECS=[["Cancerologie","🎗️"],["Cardiologie","❤️"],["Chirurgie maxillo-faciale","🦷"],["Dermatologie","🔬"],["Digestif","🍽️"],["Douleur et soins palliatifs","🕊️"],["Endocrinologie","🦋"],["Geriatrie","👴"],["Gynecologie-obstetrique","🤰"],["Hematologie","🩸"],["Immunologie","🧬"],["Infectiologie","🦠"],["Medecine interne","🔎"],["Medecine physique et readaptation","♿"],["Nephrologie","💧"],["Neurologie","🧠"],["Nutrition","🥦"],["Ophtalmologie","👁️"],["ORL","👂"],["Pediatrie","👶"],["Pneumologie","🫁"],["Psychiatrie","🧩"],["Rhumatologie","🦴"],["Sante publique","🏛️"],["Therapeutiques","💊"],["Urgences","🚑"],["Urologie","🔵"],["Anesthesie","😷"],["Reanimation","⚡"],["Chirurgie digestif","🔪"],["Chirurgie orthopedique","🦿"],["Genetique","🧬"],["Imagerie","🖥️"],["Sport","🏃"]];
var SPEC_MAP={}; SPECS.forEach(function(s){SPEC_MAP[s[0]]=s[1];});
function siLd(k,d){try{var r=localStorage.getItem('si_'+k);return r===null?d:r}catch(e){return d}}
function siSv(k,v){try{localStorage.setItem('si_'+k,v)}catch(e){}}
function getEffTitle(it){var t=siLd('ti_'+it.num,'');return t||it.title;}
function getEffSpec(it){var s=siLd('sc_'+it.num,'');return s||it.spec;}

function sv(k,v){try{localStorage.setItem('pl_'+k,v)}catch(e){}}
function ld(k,d){try{var r=localStorage.getItem('pl_'+k);return r===null?d:r}catch(e){return d}}
function svJ(k,v){sv(k,JSON.stringify(v))}
function ldJ(k,d){try{var r=localStorage.getItem('pl_'+k);return r?JSON.parse(r):d}catch(e){return d}}
var placement=ldJ('placement',{});
// itemPlacements: array de {uid, date, slot, num} — slot = 'new'|'qcm', autorise les doublons
var itemPlacements=ldJ('itemPlacements',[]);
var itemUidCounter=ldJ('itemUidCounter',0);
var todoPerso=ldJ('todoPerso',{}); // {date: [{id,text,done}]}
var weekObjectives=ldJ('weekObjectives',{}); // {monday: [{id,text,done}]}
var journal=ldJ('journal',{}); // {monday: [{id,text}]} — carnet de bord (gratitude, découvertes, pensées)
var curTab='planning',curSem=1,sidebarMode='items',dragData=null;
function isDone(k){return ld('done_'+k,'0')==='1';}
function saveAll(){svJ('placement',placement);renderCal();renderSidebar();updStats();}
function saveItemPlacements(){svJ('itemPlacements',itemPlacements);svJ('itemUidCounter',itemUidCounter);renderCal();renderSidebar();updStats();}
function getPlacedIds(type){var s=new Set();Object.values(placement).forEach(function(arr){arr.forEach(function(p){if(p.type===type)s.add(String(p.id));});});return s;}
function getItemPlacementsForDay(dt){return itemPlacements.filter(function(p){return p.date===dt;});}
function getItemOccurrences(num){return itemPlacements.filter(function(p){return String(p.num)===String(num);});}
function onDragStart(e,data){dragData=data;e.dataTransfer.effectAllowed='move';e.currentTarget.style.opacity='0.5';}
function onDragEnd(e){e.currentTarget.style.opacity='1';}
function onDragOver(e,dt){e.preventDefault();document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});var el=document.getElementById('dz_'+dt);if(el)el.classList.add('drag-over');}
function onDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function onDrop(e,dt){
  e.preventDefault();
  document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('drag-over');});
  if(!dragData||dragData.type==='item')return;
  if(dragData.fromDate&&placement[dragData.fromDate]){
    placement[dragData.fromDate]=placement[dragData.fromDate].filter(function(p){return!(p.type===dragData.type&&String(p.id)===String(dragData.id));});
  }
  if(!placement[dt])placement[dt]=[];
  var already=placement[dt].some(function(p){return p.type===dragData.type&&String(p.id)===String(dragData.id);});
  if(!already)placement[dt].push({type:dragData.type,id:dragData.id});
  saveAll();
}
function removePlacement(dt,type,id){
  if(placement[dt])placement[dt]=placement[dt].filter(function(p){return!(p.type===type&&String(p.id)===String(id));});
  saveAll();
}
// Drop d'un item dans une sous-zone (new/qcm)
function onItemDrop(e,dt,slot){
  e.preventDefault();
  document.querySelectorAll('.drop-zone,.slot-zone').forEach(function(z){z.classList.remove('drag-over');});
  if(!dragData||dragData.type!=='item')return;
  if(dragData.uid!=null){
    // Déplacement d'une instance existante : on garde le même uid, on met juste à jour sa date/slot
    var existing=itemPlacements.find(function(p){return p.uid===dragData.uid;});
    if(existing){
      existing.date=dt;
      existing.slot=slot;
      saveItemPlacements();
      return;
    }
  }
  itemUidCounter++;
  itemPlacements.push({uid:itemUidCounter,date:dt,slot:slot,num:dragData.id});
  saveItemPlacements();
}
function onSlotDragOver(e,dt,slot){e.preventDefault();document.querySelectorAll('.slot-zone').forEach(function(z){z.classList.remove('drag-over');});var el=document.getElementById('slotz_'+dt+'_'+slot);if(el)el.classList.add('drag-over');}
function onSlotDragLeave(e){e.currentTarget.classList.remove('drag-over');}
function removeItemPlacement(uid){
  itemPlacements=itemPlacements.filter(function(p){return p.uid!==uid;});
  saveItemPlacements();
}
// To-do perso (par jour)
function addTodo(dt){
  var inp=document.getElementById('todoInp_'+dt);
  var v=inp.value.trim();
  if(!v)return;
  if(!todoPerso[dt])todoPerso[dt]=[];
  todoPerso[dt].push({id:'t'+Date.now()+Math.random().toString(36).slice(2,6),text:v,done:false});
  inp.value='';
  svJ('todoPerso',todoPerso);
  renderCal();
}
function togTodo(dt,id){
  var arr=todoPerso[dt]||[];
  var t=arr.find(function(x){return x.id===id;});
  if(t)t.done=!t.done;
  svJ('todoPerso',todoPerso);
  renderCal();
}
function delTodo(dt,id){
  todoPerso[dt]=(todoPerso[dt]||[]).filter(function(x){return x.id!==id;});
  svJ('todoPerso',todoPerso);
  renderCal();
}
function todoKeydown(e,dt){if(e.key==='Enter')addTodo(dt);}

  weekObjectives[monday].push({id:'w'+Date.now()+Math.random().toString(36).slice(2,6),text:v,done:false});
  inp.value='';
  svJ('weekObjectives',weekObjectives);
  renderCal();
}
function togWeekObj(monday,id){
  var arr=weekObjectives[monday]||[];
  var o=arr.find(function(x){return x.id===id;});
  if(o)o.done=!o.done;
  svJ('weekObjectives',weekObjectives);
  renderCal();
}
function delWeekObj(monday,id){
  weekObjectives[monday]=(weekObjectives[monday]||[]).filter(function(x){return x.id!==id;});

  renderCal();
}
function weekObjKeydown(e,monday){if(e.key==='Enter')addWeekObj(monday);}
// Carnet de bord (pensées positives, gratitude, découvertes culturelles...)
function addJournal(monday){
  var inp=document.getElementById('journalInp_'+monday);
  var v=inp.value.trim();
  if(!v)return;
  if(!journal[monday])journal[monday]=[];
  journal[monday].push({id:'j'+Date.now()+Math.random().toString(36).slice(2,6),text:v});
  inp.value='';
  svJ('journal',journal);
  renderCal();
}
function delJournal(monday,id){
  journal[monday]=(journal[monday]||[]).filter(function(x){return x.id!==id;});
  svJ('journal',journal);
  renderCal();
}
function journalKeydown(e,monday){if(e.key==='Enter')addJournal(monday);}
function setTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('active',['planning','dash-items','dash-mc','dash-ann','dash-journal'][i]===tab);});
  document.getElementById('planningView').style.display=(tab==='planning')?'flex':'none';
  ['dash-items','dash-mc','dash-ann','dash-journal'].forEach(function(id){document.getElementById(id).style.display=(tab===id)?'flex':'none';});
  if(tab==='dash-items')renderDashItems();
  else if(tab==='dash-mc')renderDashMc();
  else if(tab==='dash-ann')renderDashAnn();
  else if(tab==='dash-journal')renderDashJournal();
}
function setSidebarMode(mode){
  sidebarMode=mode;
  ['items','mc','ann'].forEach(function(m){
    var b=document.getElementById('sbtn_'+m);
    if(b){b.style.background=m===mode?'#2a4f7a':'white';b.style.color=m===mode?'white':'#555';}
  });
  document.getElementById('sidebarSearch').value='';
  renderSidebar();
}
function filterSidebar(q){renderSidebar(q);}
function esc(s){if(!s)return'';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtD(s){var d=new Date(s+'T12:00');return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});}
function renderSidebar(q){
  q=(q||document.getElementById('sidebarSearch').value||'').toLowerCase();
  var list=document.getElementById('sidebarList');
  if(sidebarMode==='items'){
    list.innerHTML=ITEMS.filter(function(it){var t=getEffTitle(it),sp=getEffSpec(it);return!q||(String(it.num).includes(q)||t.toLowerCase().includes(q)||sp.toLowerCase().includes(q));}).map(function(it){
      var occ=getItemOccurrences(it.num);
      var t=getEffTitle(it),sp=getEffSpec(it),ic=getEffIcon(it);
      var occDetail='';
      if(occ.length){
        var cNew=occ.filter(function(p){return p.slot==='new';}).length;
        var cQcm=occ.filter(function(p){return p.slot==='qcm';}).length;
        var parts=[];
        if(cNew)parts.push('🆕'+cNew);
        if(cQcm)parts.push('📝'+cQcm);
        occDetail=' · <span style="cursor:pointer;text-decoration:underline" onclick="showItemOccurrences(event,'+it.num+')">'+parts.join(' ')+'</span>';
      }
      return '<div class="side-pill pill-item" draggable="true" ondragstart="onDragStart(event,{type:\'item\',id:\''+it.num+'\'})" ondragend="onDragEnd(event)">'+
        '<div style="font-size:13px;cursor:pointer" onclick="openItemEdit(event,'+it.num+')" title="Modifier emoji/spécialité/titre">'+ic+'</div><div class="side-pill-body">'+
        '<div class="side-pill-title">Item '+it.num+' — '+esc(t)+' <span style="opacity:.35;cursor:pointer" onclick="openItemEdit(event,'+it.num+')">✎</span></div>'+
        '<div class="side-pill-meta">'+esc(sp)+' · '+getEffNObj(it)+' obj'+occDetail+'</div></div></div>';
    }).join('');
    document.getElementById('sidebarCount').textContent=ITEMS.length+' items · glisse-les (répétition possible)';
  } else if(sidebarMode==='mc'){
    var placed=getPlacedIds('mc');
    list.innerHTML=MASTERCLASS.filter(function(mc){return!q||(mc.desc.toLowerCase().includes(q)||mc.spec.toLowerCase().includes(q));}).map(function(mc){
      var p=placed.has(mc.id);
      return '<div class="side-pill pill-mc'+(p?' assigned':'')+'" draggable="'+(p?'false':'true')+'" ondragstart="onDragStart(event,{type:\'mc\',id:\''+mc.id+'\'})" ondragend="onDragEnd(event)">'+
        '<div style="font-size:13px">'+mc.icon+'</div><div class="side-pill-body">'+
        '<div class="side-pill-title">'+esc(mc.desc)+'</div>'+
        '<div class="side-pill-meta">'+mc.icon+' '+esc(mc.spec)+' · ⭐'+mc.note+(p?' · ✓':'')+'</div></div></div>';
    }).join('');
    document.getElementById('sidebarCount').textContent=MASTERCLASS.filter(function(mc){return!placed.has(mc.id);}).length+' restantes';
  } else {
    var placed=getPlacedIds('ann');
    list.innerHTML=ANNALES.filter(function(a){return!q||a.label.toLowerCase().includes(q);}).map(function(a){
      var p=placed.has(a.id);
      return '<div class="side-pill pill-ann pill-ann-'+a.type+(p?' assigned':'')+'" draggable="'+(p?'false':'true')+'" ondragstart="onDragStart(event,{type:\'ann\',id:\''+a.id+'\'})" ondragend="onDragEnd(event)">'+
        '<div style="font-size:13px">📝</div><div class="side-pill-body">'+
        '<div class="side-pill-title">'+esc(a.label)+'</div>'+
        '<div class="side-pill-meta" style="color:'+a.color+'">'+a.type.toUpperCase()+(p?' · ✓':'')+'</div></div></div>';
    }).join('');
    document.getElementById('sidebarCount').textContent=ANNALES.filter(function(a){return!placed.has(a.id);}).length+' restantes';
  }
}
function renderCalPill(p,dt){
  if(p.type==='mc'){
    var mc=MASTERCLASS.find(function(x){return x.id===p.id;});if(!mc)return'';
    return '<div class="cal-pill pill-mc" draggable="true" ondragstart="onDragStart(event,{type:\'mc\',id:\''+mc.id+'\',fromDate:\''+dt+'\'})" ondragend="onDragEnd(event)">'+
      '<div style="font-size:10px">'+mc.icon+'</div><div class="cal-pill-text">'+
      '<span style="font-size:8px;font-weight:600;color:#c87b55">MC</span> '+
      '<span style="font-size:8px;color:#333">'+esc(mc.desc.substring(0,38))+'</span>'+
      '<div style="font-size:7px;color:#aaa;margin-top:1px">⭐'+mc.note+' · '+esc(mc.spec)+'</div></div>'+
      '<span class="cal-pill-remove" onclick="removePlacement(\''+dt+'\',\'mc\',\''+mc.id+'\')">✕</span></div>';
  } else if(p.type==='ann'){
    var ann=ANNALES.find(function(x){return x.id===p.id;});if(!ann)return'';
    return '<div class="cal-pill pill-ann pill-ann-'+ann.type+'" draggable="true" ondragstart="onDragStart(event,{type:\'ann\',id:\''+ann.id+'\',fromDate:\''+dt+'\'})" ondragend="onDragEnd(event)">'+
      '<div style="font-size:10px">📝</div><div class="cal-pill-text">'+
      '<span style="font-size:8px;font-weight:600;color:'+ann.color+'">'+ann.type.toUpperCase()+'</span>'+
      '<div style="font-size:8px;color:#333">'+esc(ann.label)+'</div></div>'+
      '<span class="cal-pill-remove" onclick="removePlacement(\''+dt+'\',\'ann\',\''+ann.id+'\')">✕</span></div>';
  }return'';
}
function renderItemPill(p){
  var it=ITEMS.find(function(x){return String(x.num)===String(p.num);});if(!it)return'';
  var done=isDone('item_'+it.num);
  var t=getEffTitle(it),ic=getEffIcon(it);
  return '<div class="cal-pill pill-item" draggable="true" ondragstart="onDragStart(event,{type:\'item\',id:\''+it.num+'\',uid:'+p.uid+'})" ondragend="onDragEnd(event)">'+
    '<div style="font-size:10px;cursor:pointer" onclick="openItemEdit(event,'+it.num+')" title="Modifier">'+ic+'</div><div class="cal-pill-text">'+
    '<input type="checkbox" style="width:9px;height:9px;accent-color:#7a6a9a;cursor:pointer;margin-right:2px" '+(done?'checked':'')+' onchange="togItemDone('+it.num+',this,event)">'+
    '<span style="font-size:9px;font-weight:700;color:#7a6a9a">'+it.num+'</span> '+
    '<span style="font-size:8px;color:'+(done?'#ccc':'#333')+(done?';text-decoration:line-through':'')+'"">'+esc(t.substring(0,32))+'</span>'+
    '<div style="font-size:7px;color:#aaa;margin-top:1px">'+getEffNObj(it)+' obj</div></div>'+
    '<span class="cal-pill-remove" onclick="removeItemPlacement('+p.uid+')">✕</span></div>';
}
function renderCal(){
  var w=WEEKS[curSem-1];
  var wdDays=w.days.filter(function(d){return d.weekday<5;});
  var weDays=w.days.filter(function(d){return d.weekday>=5;});
  var totalObjWeek=0,totalItemsWeek=0;
  w.days.forEach(function(d){
    getItemPlacementsForDay(d.date).forEach(function(p){
      var it=ITEMS.find(function(x){return String(x.num)===String(p.num);});
      if(it){totalObjWeek+=getEffNObj(it);totalItemsWeek++;}
    });
  });
  var hdr='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px">'+
    '<span style="font-size:10px;color:#999;font-weight:600">Semaine '+w.sem+'</span>'+
    '<span style="font-size:10px;font-weight:700;color:#2d5a6b;background:#eef3f4;border-radius:8px;padding:3px 10px">'+totalItemsWeek+' item'+(totalItemsWeek!==1?'s':'')+' · '+totalObjWeek+' objectif'+(totalObjWeek!==1?'s':'')+' au total</span>'+
    '</div>';
  var html=hdr+'<div class="week-days-grid">'+wdDays.map(renderDay).join('')+'</div>';
  if(weDays.length)html+='<div class="weekend-row">'+weDays.map(renderDay).join('')+'</div>';
  html+=renderWeekObjectives(w.lundi);
  html+=renderJournal(w.lundi);
  document.getElementById('calArea').innerHTML=html;
}
function renderWeekObjectives(monday){
  var list=weekObjectives[monday]||[];
  var rows=list.map(function(o){
    return '<div class="wobj-row'+(o.done?' done':'')+'">'+
      '<input type="checkbox" '+(o.done?'checked':'')+' onchange="togWeekObj(\''+monday+'\',\''+o.id+'\')">'+
      '<span class="wobj-text">'+esc(o.text)+'</span>'+
      '<span class="wobj-del" onclick="delWeekObj(\''+monday+'\',\''+o.id+'\')">✕</span></div>';
  }).join('');
  return '<div class="week-objectives">'+
    '<div class="wo-title">🪷 Objectifs de la semaine</div>'+
    '<div class="wo-list">'+(rows||'<div class="wo-empty">Aucun objectif pour le moment</div>')+'</div>'+
    '<div class="wo-add"><input type="text" id="weekObjInp_'+monday+'" placeholder="…." onkeydown="weekObjKeydown(event,\''+monday+'\')"><button onclick="addWeekObj(\''+monday+'\')">+</button></div>'+
    '</div>';
}
function renderJournal(monday){
  var list=journal[monday]||[];
  var rows=list.map(function(j){
    return '<div class="journal-row">'+
      '<span class="journal-dot">✦</span>'+
      '<span class="journal-text">'+esc(j.text)+'</span>'+
      '<span class="journal-del" onclick="delJournal(\''+monday+'\',\''+j.id+'\')">✕</span></div>';
  }).join('');
  return '<div class="week-journal">'+
    '<div class="wj-title">📔 Carnet de bord</div>'+
    '<div class="wj-sub">pensées positives · gratitude · découvertes culturelles · jolis moments…</div>'+
    '<div class="wj-list">'+(rows||'<div class="wj-empty">Rien noté pour le moment</div>')+'</div>'+
    '<div class="wj-add"><input type="text" id="journalInp_'+monday+'" placeholder="…." onkeydown="journalKeydown(event,\''+monday+'\')"><button onclick="addJournal(\''+monday+'\')">+</button></div>'+
    '</div>';
}
function renderDay(d){
  var dt=d.date,pills=placement[dt]||[];
  var itemPl=getItemPlacementsForDay(dt);
  var totalObj=itemPl.reduce(function(acc,p){
    var it=ITEMS.find(function(x){return String(x.num)===String(p.num);});return acc+(it?getEffNObj(it):0);},0);
  var card='<div class="day-card'+(d.blocked?' blocked':'')+(d.weekday>=5?' we-card':'')+'">';
  card+='<div class="day-hdr'+(d.blocked?' blocked-hdr':'')+'">'+
    '<span class="dname">'+d.day_name+(d.sport?' 🏃':'')+(d.blocked?' ⛔':'')+'</span>'+
    '<span class="ddate">'+fmtD(dt)+'</span>'+
    '<span class="dobj-count" id="obj_'+dt+'" style="'+(totalObj?'':'display:none')+'">'+totalObj+' obj</span></div>';
  card+='<div class="day-fixed">';
  var ak='anki_'+dt;
  card+='<div class="fixed-task"><input type="checkbox" '+(isDone(ak)?'checked':'')+' onchange="togFixed(\''+ak+'\',this)"><span class="fixed-lbl'+(isDone(ak)?' done':'')+'" id="fl_'+ak+'">🗂 Anki</span></div>';
  if(d.ecg){var ek='ecg_'+dt;card+='<div class="fixed-task"><input type="checkbox" '+(isDone(ek)?'checked':'')+' onchange="togFixed(\''+ek+'\',this)"><span class="fixed-lbl'+(isDone(ek)?' done':'')+'" id="fl_'+ek+'">🫀 ECG</span></div>';}
  var anc='ancrage_'+dt;
  card+='<div class="fixed-task"><input type="checkbox" '+(isDone(anc)?'checked':'')+' onchange="togFixed(\''+anc+'\',this)"><span class="fixed-lbl'+(isDone(anc)?' done':'')+'" id="fl_'+anc+'">⚓ Ancrage</span></div>';
  card+='</div>';

  if(!d.blocked){
    card+=renderItemSlots(dt,itemPl);
  }

  card+='<div class="drop-zone" id="dz_'+dt+'" ondragover="onDragOver(event,\''+dt+'\')" ondragleave="onDragLeave(event)" ondrop="onDrop(event,\''+dt+'\')">';
  if(!pills.length)card+='<div class="drop-empty">Masterclass / Annales</div>';
  else pills.forEach(function(p){card+=renderCalPill(p,dt);});
  card+='</div>';

  card+=renderTodoPerso(dt);

  card+='</div>';
  return card;
}
function renderItemSlots(dt,itemPl){
  var slots=[['new','🆕','New'],['qcm','📝','QCM']];
  var html='<div class="item-slots">';
  slots.forEach(function(s){
    var key=s[0],icon=s[1],label=s[2];
    var items=itemPl.filter(function(p){return p.slot===key;});
    html+='<div class="slot-block">'+
      '<div class="slot-label">'+icon+' '+label+'</div>'+
      '<div class="slot-zone" id="slotz_'+dt+'_'+key+'" ondragover="onSlotDragOver(event,\''+dt+'\',\''+key+'\')" ondragleave="onSlotDragLeave(event)" ondrop="onItemDrop(event,\''+dt+'\',\''+key+'\')">'+
      (items.length?items.map(function(p){return renderItemPill(p);}).join(''):'<div class="slot-empty">+</div>')+
      '</div></div>';
  });
  html+='</div>';
  return html;
}
function renderTodoPerso(dt){
  var list=todoPerso[dt]||[];
  var rows=list.map(function(t){
    return '<div class="todo-row'+(t.done?' done':'')+'">'+
      '<input type="checkbox" '+(t.done?'checked':'')+' onchange="togTodo(\''+dt+'\',\''+t.id+'\')">'+
      '<span class="todo-text">'+esc(t.text)+'</span>'+
      '<span class="todo-del" onclick="delTodo(\''+dt+'\',\''+t.id+'\')">✕</span></div>';
  }).join('');
  return '<div class="todo-perso">'+
    '<div class="todo-title">✏️ To-do perso</div>'+
    '<div class="todo-list">'+rows+'</div>'+
    '<div class="todo-add"><input type="text" id="todoInp_'+dt+'" placeholder="Ajouter…" onkeydown="todoKeydown(event,\''+dt+'\')"><button onclick="addTodo(\''+dt+'\')">+</button></div>'+
    '</div>';
}
function togFixed(key,cb){sv('done_'+key,cb.checked?'1':'0');var el=document.getElementById('fl_'+key);if(el)el.className='fixed-lbl'+(cb.checked?' done':'');updStats();}
function togItemDone(num,cb,e){if(e)e.stopPropagation();sv('done_item_'+num,cb.checked?'1':'0');renderCal();updStats();}
function renderWeekNav(){
  document.getElementById('weekNav').innerHTML=WEEKS.map(function(w){
    var allI=[];w.days.forEach(function(d){getItemPlacementsForDay(d.date).forEach(function(p){allI.push(String(p.num));});});
    var done=allI.length>0&&allI.every(function(id){return isDone('item_'+id);});
    return '<button class="wtab'+(w.sem===curSem?' active':'')+(done?' done':'')+'" onclick="goSem('+w.sem+')">S'+w.sem+' · '+w.label+'</button>';
  }).join('');
}
function goSem(s){curSem=s;renderWeekNav();renderCal();}
function getSemForDate(dt){var w=WEEKS.find(function(wk){return wk.days.some(function(d){return d.date===dt;});});return w?w.sem:null;}
function showItemOccurrences(e,num){
  e.stopPropagation();
  var occ=getItemOccurrences(num);
  if(!occ.length){toast('Cet item n\'est placé nulle part');return;}
  var slotLbl={new:'🆕 New',qcm:'📝 QCM'};
  var cNew=occ.filter(function(p){return p.slot==='new';}).length;
  var cQcm=occ.filter(function(p){return p.slot==='qcm';}).length;
  var summary='🆕 New: '+cNew+' · 📝 QCM: '+cQcm;
  var lines=occ.map(function(p){
    var sem=getSemForDate(p.date);
    return fmtD(p.date)+(sem?' (S'+sem+')':'')+' — '+(slotLbl[p.slot]||p.slot);
  }).join('\n');
  alert('Item #'+num+' placé '+occ.length+' fois\n'+summary+'\n\n'+lines);
}
function getSemFor(type,id){var sem=null;Object.entries(placement).forEach(function(e){if(e[1].some(function(p){return p.type===type&&String(p.id)===String(id);})){sem=getSemForDate(e[0]);}});return sem;}
function renderDashItems(){
  document.getElementById('dash-items-body').innerHTML=ITEMS.map(function(it){
    var occ=getItemOccurrences(it.num);
    var done=isDone('item_'+it.num);
    var t=getEffTitle(it),sp=getEffSpec(it),ic=getEffIcon(it);
    var nObj=getEffNObj(it);
    var cNew=occ.filter(function(p){return p.slot==='new';}).length;
    var cQcm=occ.filter(function(p){return p.slot==='qcm';}).length;
    function slotBadge(n,color,bg){return n>0?'<span style="font-weight:700;color:'+color+';background:'+bg+';border-radius:4px;padding:1px 6px;font-size:9px">'+n+'</span>':'<span style="color:#ddd;font-size:9px">0</span>';}
    var occLbl='—';
    if(occ.length){
      var slotIcon={new:'🆕',qcm:'📝'};
      occLbl=occ.map(function(p){
        var sem=getSemForDate(p.date);
        return '<span style="white-space:nowrap;display:inline-block;margin:1px 3px 1px 0;font-size:9px;background:#f0edf6;border-radius:4px;padding:1px 5px">'+(slotIcon[p.slot]||'')+' '+fmtD(p.date)+(sem?' (S'+sem+')':'')+'</span>';
      }).join('');
    }
    return '<tr><td style="font-weight:700;color:#7a6a9a">'+it.num+'</td>'+
      '<td><span style="cursor:pointer" onclick="openItemEdit(event,'+it.num+')">'+ic+'</span> '+esc(t)+' <span style="opacity:.3;cursor:pointer;font-size:9px" onclick="openItemEdit(event,'+it.num+')">✎</span></td><td style="font-size:9px;color:#888">'+esc(sp)+'</td>'+
      '<td style="text-align:center;color:#888">'+nObj+' <span style="opacity:.3;cursor:pointer;font-size:9px" onclick="openItemEdit(event,'+it.num+')">✎</span></td>'+
      '<td style="text-align:center">🆕 '+slotBadge(cNew,'#1a6a8a','#e8f2f5')+'</td>'+
      '<td style="text-align:center">📝 '+slotBadge(cQcm,'#6a1a8a','#f0e5f5')+'</td>'+
      '<td style="text-align:center"><span class="sem-badge'+(occ.length?' assigned':'')+'">'+occ.length+'×</span></td>'+
      '<td>'+occLbl+'</td>'+
      '<td style="text-align:center"><input type="checkbox" '+(done?'checked':'')+' onchange="togItemDone('+it.num+',this)" style="accent-color:#7a6a9a;cursor:pointer;width:13px;height:13px"></td></tr>';
  }).join('');
}
function renderDashMc(){
  var placed=getPlacedIds('mc');
  document.getElementById('dash-mc-body').innerHTML=MASTERCLASS.map(function(mc){
    var p=placed.has(mc.id),sem=getSemFor('mc',mc.id),done=isDone('mc_'+mc.id);
    return '<tr><td style="font-weight:700;color:#c87b55">'+mc.note+'</td>'+
      '<td>'+esc(mc.desc)+'</td><td style="font-size:9px">'+mc.icon+' '+esc(mc.spec)+'</td>'+
      '<td><span class="sem-badge'+(p?' assigned':'')+'">'+( sem?'S'+sem:'—')+'</span></td>'+
      '<td style="text-align:center"><input type="checkbox" '+(done?'checked':'')+' onchange="togMcDone(\''+mc.id+'\',this)" style="accent-color:#c87b55;cursor:pointer;width:13px;height:13px"></td></tr>';
  }).join('');
}
function togMcDone(id,cb){sv('done_mc_'+id,cb.checked?'1':'0');}
function renderDashAnn(){
  var placed=getPlacedIds('ann');
  document.getElementById('dash-ann-body').innerHTML=ANNALES.map(function(a){
    var p=placed.has(a.id),sem=getSemFor('ann',a.id);
    function chk(k){var dk='ann_'+a.id+'_'+k;return'<input type="checkbox" '+(isDone(dk)?'checked':'')+' onchange="togAnn(\''+dk+'\',this)" style="accent-color:'+a.color+';cursor:pointer;width:12px;height:12px">';}
    return '<tr><td style="font-weight:500">'+esc(a.label)+'</td>'+
      '<td><span style="font-size:9px;font-weight:700;color:'+a.color+'">'+a.type.toUpperCase()+'</span></td>'+
      '<td><span class="sem-badge'+(p?' assigned':'')+'">'+( sem?'S'+sem:'—')+'</span></td>'+
      '<td style="text-align:center">'+chk('uc1')+'</td><td style="text-align:center">'+chk('uc2')+'</td>'+
      '<td style="text-align:center">'+chk('uc3')+'</td><td style="text-align:center">'+chk('lca1')+'</td>'+
      '<td style="text-align:center">'+chk('lca2')+'</td></tr>';
  }).join('');
}
function togAnn(key,cb){sv('done_'+key,cb.checked?'1':'0');}
function renderDashJournal(){
  var mondays=Object.keys(journal).filter(function(m){return (journal[m]||[]).length>0;}).sort().reverse();
  var c=document.getElementById('dash-journal-content');
  if(!mondays.length){
    c.innerHTML='<div style="text-align:center;color:#c8b888;font-size:12px;padding:40px 0;font-style:italic">Ton carnet de bord est encore vide.<br>Ajoute tes pensées, gratitudes et découvertes semaine après semaine 📔</div>';
    return;
  }
  var html=mondays.map(function(m){
    var w=WEEKS.find(function(x){return x.lundi===m;});
    var entries=journal[m]||[];
    var rows=entries.map(function(j){
      return '<div class="journal-row">'+
        '<span class="journal-dot">✦</span>'+
        '<span class="journal-text">'+esc(j.text)+'</span>'+
        '<span class="journal-del" onclick="delJournalFromDash(\''+m+'\',\''+j.id+'\')">✕</span></div>';
    }).join('');
    return '<div class="week-journal" style="margin-top:0;margin-bottom:14px">'+
      '<div class="wj-title">'+(w?'Semaine '+w.sem+' · ':'')+fmtD(m)+'</div>'+
      '<div class="wj-list" style="margin-top:8px">'+rows+'</div>'+
      '</div>';
  }).join('');
  c.innerHTML='<div style="font-size:10px;color:#bba578;margin-bottom:14px;text-align:center">'+mondays.reduce(function(a,m){return a+(journal[m]||[]).length;},0)+' pensée(s) accumulée(s) depuis le début</div>'+html;
}
function delJournalFromDash(monday,id){
  journal[monday]=(journal[monday]||[]).filter(function(x){return x.id!==id;});
  svJ('journal',journal);
  renderDashJournal();
}
function updStats(){
  var total=ITEMS.length;
  var placedSet=new Set(itemPlacements.map(function(p){return String(p.num);}));
  var done=ITEMS.filter(function(it){return isDone('item_'+it.num);}).length;
  document.getElementById('g-items').textContent=placedSet.size+'/'+total;
  document.getElementById('g-done').textContent=Math.round(done/total*100)+'%';
  renderWeekNav();
}
renderWeekNav();renderCal();renderSidebar();updStats();setSidebarMode('items');


var ieCurNum=null, ieCurSpec=null;
function openItemEdit(e,num){
  e.stopPropagation();
  var it=ITEMS.find(function(x){return x.num===num;});
  if(!it) return;
  ieCurNum=num;
  ieCurSpec=getEffSpec(it);
  document.getElementById('ieNum').textContent='#'+num;
  document.getElementById('ieTitle').value=getEffTitle(it);
  document.getElementById('ieNObj').value=getEffNObj(it);
  var grid=document.getElementById('ieSpecGrid');
  grid.innerHTML=SPECS.map(function(s){
    var sel=s[0]===ieCurSpec;
    return '<div onclick="ieSelectSpec(\''+s[0].replace(/'/g,"\\'")+'\')" title="'+esc(s[0])+'" style="text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;font-size:16px;background:'+(sel?'#2d5a6b':'transparent')+';transition:.1s" id="iespec_'+s[0].replace(/[^a-z0-9]/gi,'_')+'">'+s[1]+'</div>';
  }).join('');
  document.getElementById('itemEditBg').style.display='flex';
}
function ieSelectSpec(spec){
  ieCurSpec=spec;
  document.querySelectorAll('#ieSpecGrid > div').forEach(function(d){d.style.background='transparent';});
  var el=document.getElementById('iespec_'+spec.replace(/[^a-z0-9]/gi,'_'));
  if(el) el.style.background='#2d5a6b';
}
function closeItemEdit(){document.getElementById('itemEditBg').style.display='none';}
function saveItemEdit(){
  var it=ITEMS.find(function(x){return x.num===ieCurNum;});
  if(!it) return;
  var newTitle=document.getElementById('ieTitle').value.trim();
  if(newTitle && newTitle!==it.title) siSv('ti_'+ieCurNum,newTitle); else siSv('ti_'+ieCurNum,'');
  if(ieCurSpec && ieCurSpec!==it.spec) siSv('sc_'+ieCurNum,ieCurSpec); else siSv('sc_'+ieCurNum,'');
  var newNObj=parseInt(document.getElementById('ieNObj').value);
  if(!isNaN(newNObj) && newNObj!==it.n_obj) siSv('nobj_'+ieCurNum,String(newNObj)); else siSv('nobj_'+ieCurNum,'');
  closeItemEdit();
  renderCal(); renderSidebar();
  if(curTab==='dash-items') renderDashItems();
  toast('Item mis à jour ✅');
}

function exportPlanning(){
    var out={placement:placement,itemPlacements:itemPlacements,itemUidCounter:itemUidCounter,todoPerso:todoPerso,weekObjectives:weekObjectives,journal:journal,done:{},v:'2.1',date:new Date().toISOString()};
    try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('pl_done_'))out.done[k.replace('pl_','')]=localStorage.getItem(k);}}catch(e){}
    var b=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='planning_edn_'+new Date().toISOString().slice(0,10)+'.json';a.click();
    toast('Planning exporté ✅');
}
function importPlanning(){
    var inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=function(e){var r=new FileReader();r.onload=function(ev){try{var d=JSON.parse(ev.target.result);
        if(d.placement){placement=d.placement;svJ('placement',placement);}
        if(d.itemPlacements){itemPlacements=d.itemPlacements;svJ('itemPlacements',itemPlacements);}
        if(d.itemUidCounter!=null){itemUidCounter=d.itemUidCounter;svJ('itemUidCounter',itemUidCounter);}
        if(d.todoPerso){todoPerso=d.todoPerso;svJ('todoPerso',todoPerso);}
        if(d.weekObjectives){weekObjectives=d.weekObjectives;svJ('weekObjectives',weekObjectives);}
        if(d.journal){journal=d.journal;svJ('journal',journal);}
        if(d.done){Object.entries(d.done).forEach(function(e){sv(e[0].replace('done_',''),e[1]);});}
        renderWeekNav();renderCal();renderSidebar();updStats();toast('Planning importé ✅');
    }catch(err){toast('Fichier invalide ❌');}};r.readAsText(e.target.files[0]);};inp.click();
}
function resetPlanning(){
    if(!confirm('Remettre le planning à zéro ?'))return;
    placement={};svJ('placement',placement);
    itemPlacements=[];itemUidCounter=0;svJ('itemPlacements',itemPlacements);svJ('itemUidCounter',itemUidCounter);
    todoPerso={};svJ('todoPerso',todoPerso);
    weekObjectives={};svJ('weekObjectives',weekObjectives);
    journal={};svJ('journal',journal);
    try{var ks=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('pl_'))ks.push(k);}ks.forEach(function(k){localStorage.removeItem(k);});}catch(e){}
    renderWeekNav();renderCal();renderSidebar();updStats();toast('Planning réinitialisé');
}
function toast(msg){
    var t=document.getElementById('toast');
    if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:#1a2f4a;color:white;padding:7px 18px;border-radius:20px;font-size:11px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none';document.body.appendChild(t);}
    t.textContent=msg;t.style.opacity='1';setTimeout(function(){t.style.opacity='0';},2500);
}

</script></body></html>
